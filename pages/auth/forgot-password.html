<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Explorlando | Forgot Password</title>
    <link rel="stylesheet" href="../../css/style.css">
</head>

<body class="forgot-password-page">

    <h2>Forgot Password</h2>

    <form id="forgotForm" class="forgot-password-form">
        <input type="email" id="email" placeholder="Enter your email" required>
        <button type="submit">Generate Reset Link</button>
    </form>

    <p id="message"></p>

    <script>
        document.getElementById("forgotForm").addEventListener("submit", async function (e) {
            e.preventDefault();

            const email = document.getElementById("email").value;
            const message = document.getElementById("message");
            message.innerHTML = "";

            const res = await fetch("/api/auth/forgotPassword.php", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ email: email })
            });

            const data = await res.json();

            message.innerText = data.message;

            if (data.reset_link) {
                message.innerHTML = data.message + "<br><br>";

                const link = document.createElement("a");
                link.href = data.reset_link;
                link.innerText = "Click here to reset your password";
                link.style.display = "inline-block";

                message.appendChild(link);
            }
        });
    </script>

</body>

</html>
