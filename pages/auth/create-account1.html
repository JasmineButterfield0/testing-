<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Explorlando | Create Account - Step 1</title>
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="../../css/create-account.css">
    <script src="../../js/script.js" defer></script>
</head>


<body class="create-account-page">


    <header class="top-bar">
        <a class="logo" href="../home/home.html">
            <img src="../../images/Explorlando-Logo.PNG" alt="Explorlando logo">
        </a>

        <form class="top-search" role="search">
            <input type="search" placeholder="Search..." aria-label="Search Explorlando">
        </form>

        <a href="../profile/profile.html" class="account-btn">
            <img src="../../images/user-1.png" alt="Account icon">
            <span>My Account</span>
        </a>
    </header>

    <div class="app-layout">

        <!-- Left nav bar -->
        <nav class="side-nav">
            <a class="nav-item active" href="login.html">Login</a>
            <a class="nav-item" href="../profile/profile.html">Profile</a>
            <a class="nav-item" href="../about.html">About Us</a>
            <a class="nav-item" href="../attractions/index.html">Attractions</a>
            <a class="nav-item" href="../open-lobby/index.html">Open Lobby</a>
            <a class="nav-item" href="../spotlight/spotlight.html">Explorlando Spotlight</a>
            <a class="nav-item" href="../for-business/index.html">For Businesses</a>
            <a class="nav-item" href="../profile/settings.html">Settings</a>
        </nav>


        <main class="auth-container create-account-main">

            <button class="back-btn" type="button" onclick="goToLogin()" aria-label="Back to Login">
                &#8592;
            </button>

            <div class="welcome-banner">
                Join the Fun!
            </div>

            <form class="login-card">

                <div class="login-title">
                    <span class="login-badge">Sign Up:</span>
                </div>

                <input type="text" name="firstName" placeholder="First Name" autocomplete="given-name">
                <input type="text" name="lastName" placeholder="Last Name" autocomplete="family-name">
                <input type="text" name="username" placeholder="Username" autocomplete="username">
                <input type="email" name="email" placeholder="Email" autocomplete="email">

                <input type="password" id="password" name="password" placeholder="Password" autocomplete="new-password">

                <label class="show-password">
                    <input type="checkbox" onclick="togglePassword('password')"> Show Password
                </label>

                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm Password"
                    autocomplete="new-password">

                <label class="show-password">
                    <input type="checkbox" onclick="togglePassword('confirmPassword')"> Show Password
                </label>

                <div class="login-actions">
                    <button type="button" onclick="goToLogin()">Back</button>
                    <button type="button" onclick="saveSignupStep1()">Next</button>
                </div>

            </form>

        </main>

    </div>

    <script>
        function togglePassword(fieldId) {
            const passwordField = document.getElementById(fieldId);

            if (passwordField.type === "password") {
                passwordField.type = "text";
            } else {
                passwordField.type = "password";
            }
        }

        function saveSignupStep1() {
            const firstName = document.querySelector('input[name="firstName"]').value.trim();
            const lastName = document.querySelector('input[name="lastName"]').value.trim();
            const username = document.querySelector('input[name="username"]').value.trim();
            const email = document.querySelector('input[name="email"]').value.trim();
            const password = document.querySelector('input[name="password"]').value;
            const confirmPassword = document.querySelector('input[name="confirmPassword"]').value;

            if (!username || !email || !password || !confirmPassword) {
                alert("Please fill out username, email, and password.");
                return;
            }

            if (password.length < 8) {
                alert("Password must be at least 8 characters.");
                return;
            }

            if (password !== confirmPassword) {
                alert("Passwords do not match.");
                return;
            }

            localStorage.setItem("signup_firstName", firstName);
            localStorage.setItem("signup_lastName", lastName);
            localStorage.setItem("signup_username", username);
            localStorage.setItem("signup_email", email);
            localStorage.setItem("signup_password", password);

            window.location.href = "create-account2.html";
        }
    </script>

</body>

</html>
